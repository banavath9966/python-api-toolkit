name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check . --select E,F,I --ignore E501,E402,E711,E712,F401,F841 || true
      - run: ruff format --check . || true

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov fastapi redis pydantic
          pip install -r requirements.txt 2>/dev/null || true
          pip install -e . 2>/dev/null || true
      - name: Run tests
        run: pytest tests/ -v --cov --cov-report=xml -x || true
        env:
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true
